name: Evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-unit:
    name: Unit Evals
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit evals
        run: uv run pytest -m eval_unit --tb=short -q

  eval-fast:
    name: LLM Evals
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run LLM evals
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run pytest -m eval_fast --tb=short -q
        continue-on-error: true
